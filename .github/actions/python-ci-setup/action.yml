name: Python CI Setup
description: Setup Python, optional pip cache, and install CI dependencies
inputs:
  python-version:
    description: Python version to use
    required: true
  cache-enabled:
    description: Enable pip cache via actions/cache
    required: false
    default: "true"
  install-profile:
    description: Dependency profile (full|light)
    required: false
    default: "full"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Get pip cache directory
      id: pip-cache-dir
      shell: bash
      run: |
        echo "dir=$(python -m pip cache dir)" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      if: ${{ inputs.cache-enabled == 'true' }}
      uses: actions/cache@v4
      with:
        path: ${{ steps.pip-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-py${{ inputs.python-version }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ inputs.python-version }}-pip-

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.install-profile }}" = "light" ]; then
          pip install flake8 pytest
        else
          pip install -r requirements.txt
          pip install flake8 pytest
        fi
