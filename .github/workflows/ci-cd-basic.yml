name: basic-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build package bundle
        run: |
          python -m compileall app
          tar -czf app-build.tar.gz app configs requirements.txt README.md
          {
            echo "build_sha=${GITHUB_SHA}"
            echo "build_run_id=${GITHUB_RUN_ID}"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > build-metadata.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            app-build.tar.gz
            build-metadata.txt
          retention-days: 14

  test:
    name: Lint and Test (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: downloaded-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Validate secret injection (masked)
        env:
          E2E_API_TOKEN: ${{ secrets.E2E_API_TOKEN }}
        run: python -c "import os; print('E2E_API_TOKEN injected:', 'yes' if os.getenv('E2E_API_TOKEN') else 'no')"

      - name: Lint (critical rules)
        run: flake8 app scripts --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Unit tests
        run: pytest app/tests/unit -q --maxfail=1

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: deploy-input

      - name: Deploy with secret (dry-run fallback)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          echo "Starting deploy for ${GITHUB_SHA}" > deploy.log
          if [ -n "${DEPLOY_WEBHOOK_URL}" ]; then
            curl -sS -X POST "${DEPLOY_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"sha\":\"${GITHUB_SHA}\",\"run_id\":\"${GITHUB_RUN_ID}\"}" \
              >> deploy.log
            echo "Deployment webhook invoked." >> deploy.log
          else
            echo "DEPLOY_WEBHOOK_URL not configured. Deploy step ran in dry-run mode." >> deploy.log
          fi

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: deploy.log
          retention-days: 14