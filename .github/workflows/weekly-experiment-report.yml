# [13주차 선택] 실험 주간 리포팅 자동화 워크플로우
# 매주 월요일: 실험 결과 집계 → GitHub Issue에 주간 리포트 자동 생성

name: Weekly Experiment Report

on:
  schedule:
    - cron: '0 1 * * 1'    # 매주 월요일 KST 10:00 (UTC 01:00)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: read
  issues: write

jobs:
  generate-report:
    name: 주간 실험 리포트 생성
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 실험 이벤트 로그 집계 스크립트 실행
      - name: 실험 데이터 집계
        id: report
        run: |
          python scripts/generate_experiment_report.py \
            --log-file logs/ab_test_events.jsonl \
            --output /tmp/weekly_report.md \
            --week $(date +%V)
        continue-on-error: true

      # GitHub Issue에 주간 리포트 생성
      - name: 주간 리포트 이슈 생성
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toLocaleDateString('ko-KR', {
              timeZone: 'Asia/Seoul',
              year: 'numeric', month: '2-digit', day: '2-digit'
            });

            let reportContent = '';
            try {
              reportContent = fs.readFileSync('/tmp/weekly_report.md', 'utf8');
            } catch {
              reportContent = '> 실험 데이터 파일이 없습니다. 이벤트 로그를 확인하세요.';
            }

            const body = `## 📊 주간 실험 리포트: ${today}\n\n${reportContent}\n\n---\n> 이 이슈는 GitHub Actions에 의해 자동 생성됩니다.\n> 워크플로우: [weekly-experiment-report.yml](.github/workflows/weekly-experiment-report.yml)`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 [주간 실험 리포트] ${today}`,
              body,
              labels: ['experiment', 'report', 'automated'],
            });
            console.log('주간 리포트 이슈 생성 완료');

      # 실험 백로그 자동 업데이트 (진행 중인 실험 상태 확인)
      - name: 실험 백로그 상태 요약
        run: |
          echo "### 📋 실험 백로그 현황" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 실험 | 상태 | 시작일 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| RAG_STRATEGY | 🟢 진행 중 (2주차) | 2026-05-31 |" >> $GITHUB_STEP_SUMMARY
          echo "| SEARCH_RANKING | 🟢 진행 중 (2주차) | 2026-05-31 |" >> $GITHUB_STEP_SUMMARY
          echo "| 응답 캐싱 | 🔵 계획됨 | - |" >> $GITHUB_STEP_SUMMARY
