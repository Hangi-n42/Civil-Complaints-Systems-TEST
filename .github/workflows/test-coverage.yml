# [12주차] 테스트 자동화 + 커버리지 80%+ CI 워크플로우

name: Test Coverage CI

on:
  push:
    branches: [main, 'week/**']
  pull_request:
    branches: [main]

jobs:
  # ─── Python 단위/통합 테스트 + 커버리지 ────────────────
  python-tests:
    name: Python 테스트 (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov coverage[toml]
          # requirements에서 테스트에 필요한 핵심 패키지만 설치
          pip install fastapi httpx pydantic || true

      # 단위 테스트 실행 (커버리지 측정)
      - name: pytest 실행 (커버리지)
        run: |
          python -m pytest app/tests/unit/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            -v \
            --tb=short \
            -x
        continue-on-error: true

      # 커버리지 배지 생성
      - name: 커버리지 배지 생성
        run: |
          COVERAGE=$(python -m coverage report --format=total 2>/dev/null || echo "0")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "COVERAGE_COLOR=$COLOR" >> $GITHUB_ENV
          echo "### 📊 테스트 커버리지: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      # XML 커버리지 리포트 아티팩트 저장
      - name: 커버리지 아티팩트 저장
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      # PR에 커버리지 코멘트 추가
      - name: PR 커버리지 코멘트
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const coverage = process.env.COVERAGE || '0';
            const emoji = parseInt(coverage) >= 80 ? '✅' : '⚠️';
            const body = `## ${emoji} Python 테스트 커버리지: ${coverage}%\n\n${parseInt(coverage) >= 80 ? '커버리지 기준(80%) 충족' : '⚠️ 커버리지 기준(80%) 미달 - 테스트를 추가하세요'}\n\n[상세 리포트 보기](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.data.find(c => c.body.includes('Python 테스트 커버리지'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }

  # ─── Playwright E2E 테스트 (선택과제) ─────────────────
  e2e-tests:
    name: Playwright E2E 테스트
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Playwright 의존성 설치
        run: |
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: E2E 테스트 실행
        run: |
          npx playwright test tests/e2e/ \
            --reporter=html \
            --project=chromium
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://localhost:3000' }}

      # 실패 시 스크린샷 아티팩트 저장 (선택과제 요구사항)
      - name: 실패 스크린샷 저장
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Playwright 리포트 저장
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7
